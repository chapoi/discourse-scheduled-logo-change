en:
  theme_metadata:
    description:
      Automatically swap the site logo on a recurring seasonal schedule
      using uploaded images.
    settings:
      schedules:
        description: >-
          Each schedule needs at least one image set, otherwise it has no
          effect and the site's default logos are used.
        schema:
          properties:
            name:
              label: Name
              description: A label to identify this schedule (e.g. "Christmas" or "Halloween").
            start_month:
              label: Start month
              description: Month the schedule begins.
            start_day:
              label: Start day
              description: Day of the month the schedule begins (1–31).
            end_month:
              label: End month
              description: Month the schedule ends.
            end_day:
              label: End day
              description: Day of the month the schedule ends (1–31).
            logo:
              label: Primary logo
              description: The logo image at the top left of your site, used in light mode.
            logo_dark:
              label: Primary logo (dark)
              description: Dark mode variant of the main logo. Falls back to the main logo if not provided.
            logo_small:
              label: Small logo
              description: The small logo image at the top left of your site, seen when scrolling down, used in light mode.
            logo_small_dark:
              label: Small logo (dark)
              description: Dark mode variant of the small logo. Falls back to the small logo if not provided.
            mobile_logo:
              label: Mobile logo
              description: The logo image shown on mobile devices, used in light mode.
            mobile_logo_dark:
              label: Mobile logo (dark)
              description: Dark mode variant of the mobile logo. Falls back to the mobile logo if not provided.
